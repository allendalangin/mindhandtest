name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04  # Using an older, more stable version of Ubuntu
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: akshayaurora/buildozer-action@master
        with:
          workdir: .
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk

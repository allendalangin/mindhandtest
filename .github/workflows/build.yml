name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Sets up Java 17 for modern Android Gradle Plugin
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Buildozer data
        uses: actions/cache@v4
        with:
          path: .buildozer
          # Using a new cache key to ensure a clean start after the OOM error
          key: ${{ runner.os }}-buildozer-v2-${{ hashFiles('buildozer.spec') }}

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          liblzma-dev libsqlite3-dev libbz2-dev
          pip3 install --user --upgrade Cython==3.0.10 buildozer

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Clean old build artifacts to save memory/disk space
          buildozer android clean
          # 'yes |' handles the license agreements automatically
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_KIVY_BITSHARE: 1
          # --- THE MEMORY FIX ---
          # Increases heap size and metadata space for the Java process
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindHand-Debug-APK
          path: bin/*.apk

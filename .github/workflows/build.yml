name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Buildozer data
        uses: actions/cache@v4
        with:
          path: .buildozer
          # v3 key to ensure we move past the FileNotFoundError
          key: ${{ runner.os }}-buildozer-v3-${{ hashFiles('buildozer.spec') }}

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          liblzma-dev libsqlite3-dev libbz2-dev
          # We install appdirs and sh here so Buildozer can use them to organize files
          pip3 install --user --upgrade Cython==3.0.10 buildozer appdirs sh  toml build
          

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Safety check: Only clean if the directory exists
          if [ -d ".buildozer" ]; then
            buildozer android clean
          else
            echo ".buildozer folder not found, skipping clean for first run."
          fi
          # 'yes |' handles the license agreements automatically
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_KIVY_BITSHARE: 1
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindHand-Debug-APK
          path: bin/*.apk

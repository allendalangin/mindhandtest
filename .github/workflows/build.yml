name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Buildozer data
        uses: actions/cache@v4
        with:
          path: .buildozer
          # Updated to v4 to clear the "Broken Pipe" error state
          key: ${{ runner.os }}-buildozer-v4-${{ hashFiles('buildozer.spec') }}

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          liblzma-dev libsqlite3-dev libbz2-dev
          # Added wheel to prevent compilation errors
          pip3 install --user --upgrade Cython==3.0.10 buildozer appdirs sh toml build wheel

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Safety check for .buildozer folder
          if [ -d ".buildozer" ]; then
            buildozer android clean
          fi
          # We use a more robust yes pipe to avoid 'Broken pipe'
          yes | buildozer android debug || (echo "Build failed, checking logs" && exit 1)
        env:
          BUILDOZER_ALLOW_ORG_KIVY_BITSHARE: 1
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindHand-Debug-APK
          path: bin/*.apk
